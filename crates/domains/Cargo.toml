[package]
name    = "domains"
version = "0.1.0"
edition = "2021"

[features]
# Exposes `MockXxx` types generated by mockall for use in external test crates.
# Enable with `domains = { features = ["testing"] }` in dev-dependencies.
testing = ["dep:mockall"]

[dependencies]
thiserror   = { workspace = true }
async-trait = { workspace = true }
serde       = { workspace = true }
serde_json  = { workspace = true }
chrono      = { workspace = true }
uuid        = { workspace = true }
# bytes and mime are pure data-representation crates with no I/O;
# included here because port traits (MediaProcessor, MediaStorage) require
# their types at the boundary — keeping domain models type-safe.
bytes       = { workspace = true }
mime        = { workspace = true }
mockall     = { workspace = true, optional = true }

[dev-dependencies]
mockall     = { workspace = true }
